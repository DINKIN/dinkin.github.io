<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DINKIN — Streamer & Creator</title>

    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #ffffff;
            --accent: #9146FF; /* Twitch purple */
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        header {
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: .5rem;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .social-icons a svg {
            width: 40px;
            height: 40px;
            fill: white;
            transition: transform .2s ease;
        }

        .social-icons a:hover svg {
            transform: scale(1.15);
        }

        .section {
            max-width: 900px;
            margin: 2rem auto;
            padding: 1rem;
        }

        .embed-card {
            background: var(--card);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 2rem;
        }

        iframe {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: 10px;
        }

        footer {
            text-align: center;
            padding: 2rem;
            opacity: .6;
        }
    </style>
</head>

<body>

<header>
    <h1>DINKIN</h1>
    <p>Streamer • Content Creator • Influencer</p>

    <div class="social-icons">

        <!-- TikTok SVG -->
        <a href="https://www.tiktok.com/@YOURNAME" target="_blank">
            <svg viewBox="0 0 256 256">
                <path d="M180 0h40c0 40 36 72 72 72v40c-28 0-54-10-72-28v104c0 38-30 68-68 68s-68-30-68-68 30-68 68-68h4v40h-4c-16 0-28 12-28 28s12 28 28 28 28-12 28-28V0z"/>
            </svg>
        </a>

        <!-- Twitch SVG -->
        <a href="https://twitch.tv/YOURNAME" target="_blank">
            <svg viewBox="0 0 2400 2800">
                <path d="M500 0L0 500v1800h700v500h500l500-500h500l700-700V0H500zm1800 1400l-400 400h-500l-500 500v-500H400V200h1900v1200z"/>
                <path d="M1700 600h200v600h-200V600zm-600 0h200v600h-200V600z"/>
            </svg>
        </a>

        <!-- YouTube SVG -->
        <a href="https://youtube.com/@YOURNAME" target="_blank">
            <svg viewBox="0 0 576 512">
                <path d="M549 124c-6-23-24-41-47-47C458 64 288 64 288 64S118 64 74 77c-23 6-41 24-47 47C14 168 14 256 14 256s0 88 13 132c6 23 24 41 47 47 44 13 214 13 214 13s170 0 214-13c23-6 41-24 47-47 13-44 13-132 13-132s0-88-13-132zM232 336V176l142 80-142 80z"/>
            </svg>
        </a>

    </div>
</header>

<div class="section">

    <h2>Live Streams & Content</h2>

    <!-- Twitch Embed -->
    <div class="embed-card">
        <h3>Twitch Stream</h3>
        <iframe
            src="https://player.twitch.tv/?channel=YOURNAME&parent=yourdomain.com"
            allowfullscreen>
        </iframe>
    </div>

    <!-- TikTok Embed -->
    <div class="embed-card">
        <h3>TikTok Feed</h3>
        <iframe
            src="https://www.tiktok.com/embed/@YOURNAME"
            allowfullscreen>
        </iframe>
    </div>

    <!-- YouTube Embed -->
    <div class="embed-card">
        <h3>YouTube Videos</h3>
        <iframe
            src="https://www.youtube.com/embed?listType=user_uploads&list=YOURCHANNELNAME"
            allowfullscreen>
        </iframe>
    </div>

</div>

<footer>
    © 2026 DINKIN — All Rights Reserved
</footer>

<script>
    // JS placeholder for future interactive features
    console.log("Site loaded");
</script>

</body>
</html>
